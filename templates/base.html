<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ league_name }}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top" id="main-nav">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-trophy-fill text-warning"></i> {{ league_name }}
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="/">
            <i class="bi bi-house-fill"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'history' %}active{% endif %}" href="/history">
            <i class="bi bi-calendar3"></i> History
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'records' %}active{% endif %}" href="/records">
            <i class="bi bi-bar-chart-fill"></i> Records
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'h2h' %}active{% endif %}" href="/h2h">
            <i class="bi bi-people-fill"></i> Head-to-Head
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'sacko' %}active{% endif %}" href="/sacko">
            🚽 Sacko
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'import_view' %}active{% endif %}" href="/import">
            <i class="bi bi-cloud-arrow-down-fill"></i> Import
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container my-4">
  {% block content %}{% endblock %}
</div>

<footer class="mt-auto py-3 border-top border-secondary text-center text-muted small">
  {{ league_name }} &bull; Data sourced from ESPN Fantasy Football
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
